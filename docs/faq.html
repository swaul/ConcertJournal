<!DOCTYPE html>

  <style>
    /* global box sizing & font smoothing */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #1C2024;
      color: #ffffff;
      max-width: 800px;
      margin-inline: auto;
      width: 100%;
    }

    h1 { margin-bottom: 2rem; }

    details {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #16161d;
    }

    summary { cursor: pointer; font-weight: 600; list-style: none; }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: "＋"; float: right; opacity: 0.7; }
    details[open] summary::after { content: "－"; }
    details p { margin-top: 1rem; line-height: 1.6; opacity: 0.9; }

    a { color: #8ab4f8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer { margin-top: 4rem; font-size: 0.9rem; opacity: 0.7; }
    .loading, .error { opacity: 0.8; font-style: italic; }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      details { padding: 0.75rem; }
      summary { font-size: 0.95rem; }
      details p { font-size: 0.95rem; }
      footer { margin-top: 2.5rem; }
    }
  
    /* FOOTER STYLES */
    footer.footer {
      background: #0a0a0f;
      border-top: 1px solid #333;
      color: #ffffff;
      padding: 3rem 2rem 2rem;
      margin-top: 4rem;
      margin-left: -2rem;
      margin-right: -2rem;
      margin-bottom: -2rem;
      width: calc(100% + 4rem);
    }

    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
      padding: 0 2rem;
    }

    .footer-section h4 {
      color: #8ab4f8;
      margin: 0 0 1rem 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .footer-section p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.7;
      line-height: 1.6;
    }

    .footer-section ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .footer-section li {
      margin: 0.5rem 0;
    }

    .footer-section a {
      color: #8ab4f8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .footer-section a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .footer-bottom {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #333;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      footer.footer {
        margin-left: -1rem;
        margin-right: -1rem;
        margin-bottom: -1rem;
        width: calc(100% + 2rem);
        padding: 2rem 1rem 1.5rem;
        margin-top: 2.5rem;
      }

      .footer-content {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 0 1rem;
      }

      .footer-section h4 {
        font-size: 0.95rem;
      }

      .footer-section a,
      .footer-section p {
        font-size: 0.85rem;
      }

      .footer-bottom {
        font-size: 0.75rem;
        padding: 1.5rem 1rem;
      }
    }

  </style>
</head>

<body>

<h1>Häufige Fragen (FAQ)</h1>

<div id="faq">
  <p class="loading">Lade Inhalte …</p>
</div>

<footer>
  <p>
    <a href="impressum.html">Impressum</a> ·
    <a href="datenschutz.html">Datenschutz</a>
  </p>
</footer>

<!-- Supabase Client -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://brjekjxckpdlwffcdndn.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_9arAE6MQR0Cj0m-jE3lXCQ_BfNy0PK7";

  const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  async function loadFAQ() {
    const container = document.getElementById("faq");
    container.innerHTML = "";

    const { data, error } = await client
      .from("faq_items")
      .select("question, answer")
      .eq("is_public", true)
      .order("order", { ascending: true });

    if (error) {
      console.error(error);
      container.innerHTML = `
        <p class="error">
          Die FAQ konnten leider nicht geladen werden.
        </p>
      `;
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = `
        <p class="loading">
          Aktuell sind keine Fragen verfügbar.
        </p>
      `;
      return;
    }

    data.forEach(item => {
      const details = document.createElement("details");
      const summary = document.createElement("summary");
      const answer = document.createElement("p");

      summary.textContent = item.question;
      answer.textContent = item.answer;

      details.appendChild(summary);
      details.appendChild(answer);

      container.appendChild(details);
    });
  }

  loadFAQ();
</script>
