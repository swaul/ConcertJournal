<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Login – ConcertJournal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* global box sizing & font smoothing */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #1C2024;
      color: #ffffff;
      max-width: 420px;
      margin-inline: auto;
      width: 100%;
    }

    h1 { margin-bottom: 1.5rem; }

    label { display: block; margin-top: 1rem; font-size: 0.9rem; opacity: 0.8; }

    input {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.4rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: #16161d;
      color: #ffffff;
      font-size: 0.95rem;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .divider { text-align: center; margin: 1.5rem 0; opacity: 0.6; font-size: 0.9rem; }
    .error { color: #ff6b6b; margin-top: 1rem; font-size: 0.9rem; }

    @media (max-width: 420px) {
      body { padding: 1rem; }
      input, button { font-size: 0.95rem; padding: 0.65rem; }
      .divider { margin: 1rem 0; }
    }
  
    /* FOOTER STYLES */
    footer.footer {
      background: #0a0a0f;
      border-top: 1px solid #333;
      color: #ffffff;
      padding: 3rem 2rem 2rem;
      margin-top: 4rem;
      margin-left: -2rem;
      margin-right: -2rem;
      margin-bottom: -2rem;
      width: calc(100% + 4rem);
    }

    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
      padding: 0 2rem;
    }

    .footer-section h4 {
      color: #8ab4f8;
      margin: 0 0 1rem 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .footer-section p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.7;
      line-height: 1.6;
    }

    .footer-section ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .footer-section li {
      margin: 0.5rem 0;
    }

    .footer-section a {
      color: #8ab4f8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .footer-section a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .footer-bottom {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #333;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      footer.footer {
        margin-left: -1rem;
        margin-right: -1rem;
        margin-bottom: -1rem;
        width: calc(100% + 2rem);
        padding: 2rem 1rem 1.5rem;
        margin-top: 2.5rem;
      }

      .footer-content {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 0 1rem;
      }

      .footer-section h4 {
        font-size: 0.95rem;
      }

      .footer-section a,
      .footer-section p {
        font-size: 0.85rem;
      }

      .footer-bottom {
        font-size: 0.75rem;
        padding: 1.5rem 1rem;
      }
    }

  </style>
</head>

<body>

<h1>ConcertJournal</h1>

<label>
  E-Mail
  <input id="email" type="email" placeholder="you@example.com" />
</label>

<label>
  Passwort
  <input id="password" type="password" />
</label>

<button onclick="login()">Einloggen</button>
<!---<button onclick="signup()">Registrieren</button> --->

<div class="divider">oder</div>

<!---<button onclick="loginSpotify()">Mit Spotify anmelden</button>--->

<p id="error" class="error"></p>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://brjekjxckpdlwffcdndn.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_9arAE6MQR0Cj0m-jE3lXCQ_BfNy0PK7";

  const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const errorEl = document.getElementById("error");

  async function login() {
    errorEl.textContent = "";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      errorEl.textContent = error.message;
      return;
    }

    window.location.href = "concerts.html";
  }

  async function signup() {
    errorEl.textContent = "";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await client.auth.signUp({
      email,
      password
    });

    if (error) {
      errorEl.textContent = error.message;
      return;
    }

    window.location.href = "concerts.html";
  }

  async function loginSpotify() {
    const { error } = await client.auth.signInWithOAuth({
      provider: "spotify",
      options: {
        redirectTo: window.location.origin + "/concerts.html"
      }
    });

    if (error) {
      errorEl.textContent = error.message;
    }
  }
</script>


  <!-- FOOTER - KOPIERE DIESEN BLOCK AUF ALLE SEITEN -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h4>Concert Journal</h4>
        <p>Dokumentiere deine Konzert-Erlebnisse</p>
      </div>
      
      <div class="footer-section">
        <h4>Links</h4>
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="https://apps.apple.com" target="_blank">App Store</a></li>
          <li><a href="mailto:concertjournalapp@gmail.com">Kontakt</a></li>
        </ul>
      </div>
      
      <div class="footer-section">
        <h4>Rechtliches</h4>
        <ul>
          <li><a href="./impressum.html">Impressum</a></li>
          <li><a href="./datenschutz.html">Datenschutz</a></li>
          <li><a href="./agb.html">AGB</a></li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; 2026 Concert Journal - Alle Rechte vorbehalten</p>
    </div>
  </footer>
  <!-- FOOTER ENDE -->

</body>
</html>
